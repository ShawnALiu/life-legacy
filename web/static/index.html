<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Legacy - 数字生命</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }

        .header .status {
            font-size: 12px;
            color: #888;
        }

        .mode-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .mode-living { background: #1a3a2a; color: #4ade80; }
        .mode-legacy { background: #2a1a3a; color: #a78bfa; }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #1a5c3a;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1e1e1e;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message .label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .input-area {
            padding: 16px 24px;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 24px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #4ade80;
        }

        .input-area button {
            padding: 12px 24px;
            background: #1a5c3a;
            color: #fff;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #227a4a;
        }

        .input-area button:disabled {
            background: #333;
            cursor: not-allowed;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 12px 16px;
            background: #1e1e1e;
            border-radius: 16px;
            color: #888;
            font-size: 14px;
        }

        .typing-indicator span {
            animation: blink 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .welcome {
            text-align: center;
            margin-top: 20vh;
            color: #666;
        }

        .welcome h2 { color: #aaa; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Life Legacy</h1>
        <div class="status" id="status">加载中...</div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <h2>数字生命对话</h2>
            <p>输入消息开始与你的数字孪生体对话</p>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('status');
        const welcomeEl = document.getElementById('welcome');

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const modeClass = data.mode === 'LIVING' ? 'mode-living' : 'mode-legacy';
                statusEl.innerHTML = `${data.user_name} · ${data.age}岁 · <span class="mode-badge ${modeClass}">${data.mode_display}</span>`;
            } catch (e) {
                statusEl.textContent = '连接中...';
            }
        }

        function addMessage(role, content) {
            if (welcomeEl) welcomeEl.style.display = 'none';

            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerHTML = `<div class="label">${role === 'user' ? '你' : '数字生命'}</div>${content}`;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msg;
        }

        function addTypingIndicator() {
            if (welcomeEl) welcomeEl.style.display = 'none';

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = '<span>●</span><span>●</span><span>●</span>';
            chatContainer.appendChild(indicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            messageInput.value = '';
            sendBtn.disabled = true;

            addMessage('user', message);
            addTypingIndicator();

            try {
                const response = await fetch(`/api/chat/stream?message=${encodeURIComponent(message)}`);
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                removeTypingIndicator();

                const assistantMsg = addMessage('assistant', '');
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.content) {
                                    fullContent += parsed.content;
                                    assistantMsg.innerHTML = `<div class="label">数字生命</div>${fullContent.replace(/\n/g, '<br>')}`;
                                    chatContainer.scrollTop = chatContainer.scrollHeight;
                                }
                            } catch (e) {
                                if (data && data !== '[DONE]') {
                                    fullContent += data;
                                    assistantMsg.innerHTML = `<div class="label">数字生命</div>${fullContent.replace(/\n/g, '<br>')}`;
                                    chatContainer.scrollTop = chatContainer.scrollHeight;
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', '抱歉，连接出现了问题。请稍后再试。');
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        loadStatus();
        messageInput.focus();
    </script>
</body>
</html>
